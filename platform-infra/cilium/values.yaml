# Cilium Helm values for the BIAN platform.
# Cilium is the CNI, the kube-proxy replacement, AND the service mesh
# (sidecar-free, eBPF). Hubble provides mesh observability; the Gateway API
# implementation provides north-south ingress (Netflix Zuul's modern successor).
#
#   helm repo add cilium https://helm.cilium.io
#   helm install cilium cilium/cilium -n kube-system -f values.yaml \
#     --set k8sServiceHost=<api-server-host> --set k8sServicePort=6443
#   (install.sh fills in the kind-specific host/port)

kubeProxyReplacement: true

# ── Service mesh / L7 ─────────────────────────────────────────────────────────
# Per-endpoint Envoy managed by Cilium — no sidecars injected into app pods.
envoy:
  enabled: true

# Mutual authentication between service identities (Phase 3 hardens this
# further with SPIFFE/SPIRE integration).
authentication:
  mutual:
    spire:
      enabled: false   # flip in Phase 3

# ── Gateway API (north-south) ─────────────────────────────────────────────────
gatewayAPI:
  enabled: true

# ── Observability: Hubble (flow visibility + service map UI) ────────────────
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
  metrics:
    enableOpenMetrics: true
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction

# ── eBPF tuning ───────────────────────────────────────────────────────────────
bpf:
  masquerade: true

ipam:
  mode: kubernetes

operator:
  replicas: 1
