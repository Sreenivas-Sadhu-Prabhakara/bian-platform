# kube-prometheus-stack values for the BIAN platform.
grafana:
  adminPassword: bian-platform

prometheus:
  prometheusSpec:
    # Pick up the prometheus.io/* pod annotations every service domain ships with
    additionalScrapeConfigs:
      - job_name: bian-service-domains
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - bian-reference-data
                - bian-sales-service
                - bian-operations
                - bian-risk-compliance
                - bian-business-support
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            target_label: __metrics_path__
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_bian_service_domain]
            target_label: service_domain
          - source_labels: [__meta_kubernetes_pod_label_bian_business_area]
            target_label: business_area
      # Hubble mesh metrics (L7 http, drops, flows) exposed by Cilium agents
      - job_name: hubble
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [kube-system]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_k8s_app]
            action: keep
            regex: cilium
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:9965
            target_label: __address__
