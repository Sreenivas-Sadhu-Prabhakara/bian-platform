# Single-node KRaft Kafka for local development (Strimzi).
# Production sizing (3+ brokers, rack awareness, tiered storage) is Phase 4.
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: kafka
  labels:
    strimzi.io/cluster: bian-kafka
spec:
  replicas: 1
  roles: [controller, broker]
  # capped for small hosts (4GB Docker VM) — raise for real clusters.
  # In the v1 API these live on the node pool, not spec.kafka.
  jvmOptions: { "-Xms": "256m", "-Xmx": "512m" }
  resources:
    requests: { cpu: 200m, memory: 640Mi }
    limits: { memory: 1Gi }
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 5Gi
        deleteClaim: true
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: bian-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    # version omitted → the operator's default Kafka version
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false   # Phase 3: TLS + per-SD credentials
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}
