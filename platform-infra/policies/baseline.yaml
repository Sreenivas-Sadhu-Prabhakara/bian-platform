# Cluster-wide mesh baseline: default-deny in every BIAN namespace.
# Per-service CiliumNetworkPolicies (shipped in each Helm chart) then open
# exactly: gateway ingress, intra-platform calls, Prometheus scrape, DNS.
#
# Applied per-namespace rather than CiliumClusterwideNetworkPolicy so the
# platform namespaces stay self-contained and Phase 3 can tighten per area.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: bian-default-deny
spec:
  description: "Default-deny all traffic to BIAN service-domain workloads"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: bian-platform
  ingressDeny: []
  ingress:
    # Health/readiness probes from the kubelet are host traffic
    - fromEntities:
        - host
        - remote-node
---
# Per-SD Postgres instances are platform endpoints too (caught by the
# default-deny above) but ship no chart of their own — this grants exactly
# their one legitimate flow: platform services → 5432.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: bian-allow-platform-to-postgres
spec:
  description: "BIAN service domains may reach the per-SD databases"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: bian-platform
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/part-of: bian-platform
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
